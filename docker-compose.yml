version: "3.9"

services:
  frontend:
    build:
      context: ${FRONTEND_CONTEXT}
      dockerfile: ${FRONTEND_DOCKERFILE}
    container_name: ${FRONTEND_CONTAINER_NAME}
    ports:
      - "${FRONTEND_PORT}:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run start -- --host 0.0.0.0
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ${BACKEND_CONTAINER_NAME}
    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - ./backend/src:/app/src
      - ./backend/build.gradle:/app/build.gradle
      - ./backend/settings.gradle:/app/settings.gradle
      - gradle_cache:/home/gradle/.gradle
    command: gradle bootRun --no-daemon
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_CONTAINER_NAME: ${DB_CONTAINER_NAME:-mariadb}
      DB_PORT_CONTAINER: ${DB_PORT_CONTAINER:-3306}
      DB_NAME: ${DB_NAME:-time_manager}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET}
      SECURITY_JWT_ISSUER: ${SECURITY_JWT_ISSUER}
      SECURITY_JWT_EXPMINUTES: ${SECURITY_JWT_EXPMINUTES}
      SECURITY_JWT_REFRESH_SECRET: ${SECURITY_JWT_REFRESH_SECRET}
      SECURITY_JWT_REFRESH_DAYS: ${SECURITY_JWT_REFRESH_DAYS}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
    depends_on:
      - mariadb
    restart: always

  mariadb:
    image: ${DB_IMAGE:-mariadb:11}
    container_name: ${DB_CONTAINER_NAME:-mariadb}
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_NAME:-time_manager}
      MARIADB_USER: ${DB_USER:-app_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-app_pass}
    ports:
      - "${DB_PORT_HOST:-3307}:${DB_PORT_CONTAINER:-3306}"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./backend/db:/docker-entrypoint-initdb.d

  reverse-proxy:
    image: nginx:latest
    container_name: reverse-proxy
    depends_on:
      - frontend
      - backend
    ports:
      - "8030:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always

  sonarqube:
    image: sonarqube:latest
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - ./sonar_data:/opt/sonarqube/data
      - ./sonar_logs:/opt/sonarqube/logs

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: sonar-scanner
    depends_on:
      - sonarqube
      - backend
    environment:
      SONAR_HOST_URL: "http://sonarqube:9000"
      SONAR_TOKEN: "sqp_13b4b344d5bcb20204f9936ced5050da4e6e6e99"
    volumes:
      - ./backend:/usr/src
    working_dir: /usr/src
    command: >
      sonar-scanner
        -Dsonar.projectKey=TimeManager
        -Dsonar.sources=src
        -Dsonar.java.binaries=build/classes/java/main
        -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

volumes:
  mariadb_data:
  gradle_cache:
